<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Manuales PDF</title>
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

<h1>📘 Biblioteca de Manuales</h1>

<section id="contenedorPDF" class="pdf-container"></section>

<script>
const archivosPDF = [
    "Manual.pdf",
    "GUIA MATEMATICAS 7ABC_OK.pdf",
    "Manual3.pdf"
];

const contenedor = document.getElementById("contenedorPDF");

archivosPDF.forEach(pdf => {
    contenedor.innerHTML += `
        <div class="pdf-card">
            <h3>${pdf}</h3>
            <iframe src="Documentos/${pdf}" width="100%" height="300px"></iframe>
            <a href="Documentos/${pdf}" download class="btn-descarga">
                ⬇ Descargar PDF
            </a>
        </div>
    `;
});
</script>

</body>
</html>
