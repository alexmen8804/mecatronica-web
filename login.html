<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body class="login">

<div class="perfil">
  <h2>Iniciar Sesión</h2>

  <input type="email" id="correo" placeholder="Correo"><br><br>
  <input type="password" id="password" placeholder="Contraseña"><br><br>

  <button onclick="login()">Ingresar</button>
  <button onclick="registro()">Registrarse</button>
  <button onclick="recuperar()">¿Olvidaste tu contraseña?</button>

  <p id="mensaje"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword,
    sendEmailVerification,
    sendPasswordResetEmail
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAltIMm4o9mDaMgUIDqeJzXF2utiZKvR10",
    authDomain: "mecatronica-agroindustrial-jjr.firebaseapp.com",
    projectId: "mecatronica-agroindustrial-jjr",
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔥 MOSTRAR PÁGINA (SOLUCIÓN CLAVE)
  window.addEventListener("DOMContentLoaded", () => {
    document.body.style.opacity = "1";
  });

  // 🔐 LOGIN
  window.login = function(){
    const email = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {

        if (!userCredential.user.emailVerified) {
          document.getElementById("mensaje").innerText =
            "⚠️ Debes verificar tu correo antes de ingresar";
          return;
        }

        window.location.href = "index.html";
      })
      .catch((error) => {
        document.getElementById("mensaje").innerText = traducirError(error.message);
      });
  }

  // 📝 REGISTRO
  window.registro = function(){
    const email = document.getElementById("correo").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
      .then((userCredential) => {

        sendEmailVerification(userCredential.user);

        document.getElementById("mensaje").innerText =
          "Usuario creado ✅. Revisa tu correo 📧";
      })
      .catch((error) => {
        document.getElementById("mensaje").innerText = traducirError(error.message);
      });
  }

  // 🔑 RECUPERAR
  window.recuperar = function(){
    const email = document.getElementById("correo").value;

    if (!email) {
      document.getElementById("mensaje").innerText =
        "⚠️ Ingresa tu correo primero";
      return;
    }

    sendPasswordResetEmail(auth, email)
      .then(() => {
        document.getElementById("mensaje").innerText =
          "📧 Correo enviado correctamente";
      })
      .catch((error) => {
        document.getElementById("mensaje").innerText = traducirError(error.message);
      });
  }

  // 🔥 TRADUCIR ERRORES (MEJORA PRO)
  function traducirError(error) {
    if (error.includes("auth/invalid-email")) return "Correo inválido";
    if (error.includes("auth/user-not-found")) return "Usuario no registrado";
    if (error.includes("auth/wrong-password")) return "Contraseña incorrecta";
    if (error.includes("auth/email-already-in-use")) return "El correo ya existe";
    if (error.includes("auth/weak-password")) return "Contraseña muy débil (mínimo 6 caracteres)";
    return error;
  }

</script>

</body>
</html>
