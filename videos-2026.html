<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Videos 2026</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #f4f4f4;
    padding: 15px;
    border-radius: 10px;
}

video {
    width: 100%;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🎬 Videos Año 2026</h1>

<div class="galeria">

    <div class="card">
        <h3>PLC Básico</h3>
        <video controls>
            <source src="Videos/anio-2026/plc1.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <h3>Automatización</h3>
        <video controls>
            <source src="Videos/AÑO-2026/plc2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="card">
        <h3>Control de Motores</h3>
        <video controls>
            <source src="Videos/AÑO-2026/plc3.mp4" type="video/mp4">
        </video>
    </div>

</div>

</body>
</html>
